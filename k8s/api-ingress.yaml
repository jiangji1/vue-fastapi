apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f1-api
  namespace: f1
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: f1-api
                port:
                  number: 8000

