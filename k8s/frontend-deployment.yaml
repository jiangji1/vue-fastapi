apiVersion: apps/v1
kind: Deployment
metadata:
  name: f1-frontend
  namespace: f1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: f1-frontend
  template:
    metadata:
      labels:
        app: f1-frontend
    spec:
      containers:
        - name: web
          image: your-registry/f1-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20

