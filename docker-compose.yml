services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: f1
      MYSQL_USER: f1
      MYSQL_PASSWORD: f1
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      APP_NAME: f1-api
      ENV: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: f1
      DB_PASSWORD: f1
      DB_NAME: f1
      JWT_SECRET: "change-me-in-prod"
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: admin123
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

